<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm a Teapot | I'm a Teapot</title>
    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            background-image: linear-gradient(rgb(255, 142, 161), rgb(231, 170, 255));
            background-attachment: fixed;
            padding: 50px;
            color: white;
        }

        img {
            width: 200px;
        }

        h1, h2 {
   
            mask-image: linear-gradient(rgb(255, 255, 255), rgba(255, 255, 255, 0.24));
        }

        h1 {
            font-size: 72px;
            margin-bottom: 0;
        }
        h2 {
            font-size: 36px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 50px;
        }
        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: white;
            color: rgb(255, 142, 161);
        }
    </style>
</head>
<body>
    <h1>418</h1>
    <h2>I'm a Teapot</h2>
    <img src="gifs/Teapot.gif">
    <p>Sorry, but I am a teapot and cannot poor coffee.</p>
    <a href="/">Return to homepage</a>
</body>
</html>
